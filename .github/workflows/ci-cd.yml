name: FraudOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual'

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:

  # ─── STAGE 1: CI ───────────────────────────────────────────
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8 kfp==2.15.0

      - name: Lint with flake8
        run: |
          flake8 pipeline/ docker/inference/app.py --max-line-length=120 --ignore=E501,W503 --count

      - name: Validate pipeline YAML
        run: |
          python -c "
          import yaml, glob, sys
          files = glob.glob('pipeline/*.yaml')
          if not files:
              print('No pipeline YAMLs found, skipping')
              sys.exit(0)
          for f in files:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print(f'OK: {f}')
          "

  # ─── STAGE 2: BUILD & PUSH TO ECR ─────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push training image
        run: |
          docker build -t $ECR_REGISTRY/fraudops-training:${{ github.sha }} \
                       -t $ECR_REGISTRY/fraudops-training:latest \
                       -f docker/training/training.dockerfile .
          docker push $ECR_REGISTRY/fraudops-training:${{ github.sha }}
          docker push $ECR_REGISTRY/fraudops-training:latest

      - name: Build & push inference image
        run: |
          docker build -t $ECR_REGISTRY/fraudops-inference:${{ github.sha }} \
                       -t $ECR_REGISTRY/fraudops-inference:latest \
                       -f docker/inference/inference.dockerfile .
          docker push $ECR_REGISTRY/fraudops-inference:${{ github.sha }}
          docker push $ECR_REGISTRY/fraudops-inference:latest

  # ─── STAGE 3: DEPLOY ───────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/FraudOps
            git pull origin main

            python3 -c "
            import kfp
            client = kfp.Client(host='http://localhost:8080')
            client.create_run_from_pipeline_package(
                'pipeline/v1_pipeline.yaml',
                arguments={
                    'transaction_path': '/home/ubuntu/FraudOps/data/train_transaction.csv',
                    'identity_path': '/home/ubuntu/FraudOps/data/train_identity.csv',
                    'run_id': 'cicd-run-${{ github.run_number }}',
                    'imbalance_strategy': 'smote',
                    'cost_sensitive': True,
                    'inference_api_url': 'http://localhost:8000',
                },
                run_name='cicd-run-${{ github.run_number }}',
                experiment_name='FraudOps',
            )
            "

            sudo systemctl restart FraudOps-inference

  # ─── STAGE 4: INTELLIGENT TRIGGER ─────────────────────────
  intelligent-retrain:
    name: Intelligent Retrain
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.trigger_reason != 'manual'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH & Retrain
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/FraudOps
            git pull origin main

            python3 -c "
            import kfp
            client = kfp.Client(host='http://localhost:8080')
            client.create_run_from_pipeline_package(
                'pipeline/v1_pipeline.yaml',
                arguments={
                    'transaction_path': '/home/ubuntu/FraudOps/data/train_transaction.csv',
                    'identity_path': '/home/ubuntu/FraudOps/data/train_identity.csv',
                    'run_id': 'retrain-${{ github.run_number }}',
                    'imbalance_strategy': 'smote',
                    'cost_sensitive': True,
                    'recall_threshold': 0.75,
                    'drift_threshold': 0.10,
                    'inference_api_url': 'http://localhost:8000',
                },
                run_name='retrain-${{ github.run_number }}',
                experiment_name='FraudOps',
            )
            "

            sudo systemctl restart FraudOps-inference
